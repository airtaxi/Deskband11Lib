name: Pack and Publish NuGet

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the current packages to NuGet.org.
        required: true
        default: false
        type: boolean
  push:
    branches:
      - master
    paths:
      - .github/workflows/pack-and-publish.yml
      - Deskband11Lib.Core/**
      - Deskband11Lib.WinUI/**
      - Deskband11Lib.Wpf/**
      - Deskband11Lib.Uno.Skia/**
      - README.md
      - LICENSE

permissions:
  contents: read

concurrency:
  group: deskband11lib-pack-and-publish
  cancel-in-progress: false

jobs:
  pack-and-publish:
    name: Pack and Publish NuGet
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Resolve publish mode
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $packageProjects = @(
            @{ Id = "Deskband11Lib.Core"; Path = "Deskband11Lib.Core/Deskband11Lib.Core.csproj" },
            @{ Id = "Deskband11Lib.WinUI"; Path = "Deskband11Lib.WinUI/Deskband11Lib.WinUI.csproj" },
            @{ Id = "Deskband11Lib.Wpf"; Path = "Deskband11Lib.Wpf/Deskband11Lib.Wpf.csproj" },
            @{ Id = "Deskband11Lib.Uno.Skia"; Path = "Deskband11Lib.Uno.Skia/Deskband11Lib.Uno.Skia.csproj" }
          )

          function Get-ProjectVersion([string]$projectPath) {
            [xml]$project = Get-Content -LiteralPath $projectPath -Raw
            $version = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
            if ([string]::IsNullOrWhiteSpace($version)) { throw "Version was not found in $projectPath." }
            return $version
          }

          function Get-PreviousProjectVersion([string]$previousCommit, [string]$projectPath) {
            $previousProjectText = & git show "$previousCommit`:$projectPath" 2>$null
            if ($LASTEXITCODE -ne 0) { return $null }

            $previousProjectXml = ($previousProjectText -join "`n") -replace "^\uFEFF", ""
            [xml]$previousProject = $previousProjectXml
            $previousVersion = ($previousProject.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
            if ([string]::IsNullOrWhiteSpace($previousVersion)) { throw "Previous Version was not found in $projectPath." }
            return $previousVersion
          }

          $currentVersions = @{}
          foreach ($packageProject in $packageProjects) {
            $currentVersions[$packageProject.Id] = Get-ProjectVersion $packageProject.Path
          }

          $distinctCurrentVersions = @($currentVersions.Values | Sort-Object -Unique)
          if ($distinctCurrentVersions.Count -ne 1) {
            throw "Package versions must match. Current versions: $($currentVersions.GetEnumerator() | ForEach-Object { "$($_.Key)=$($_.Value)" } | Sort-Object | Join-String -Separator ', ')"
          }

          $currentVersion = $distinctCurrentVersions[0]
          $eventName = "${{ github.event_name }}"
          if ($eventName -eq "workflow_dispatch") {
            $shouldPublish = "${{ inputs.publish }}" -eq "true"
            "run=true" >> $env:GITHUB_OUTPUT
            "publish=$($shouldPublish.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
            "current=$currentVersion" >> $env:GITHUB_OUTPUT
            "previous=" >> $env:GITHUB_OUTPUT

            if ($shouldPublish) {
              "Manual run requested NuGet publishing for version $currentVersion."
            }
            else {
              "Manual run will test and pack version $currentVersion without publishing."
            }

            exit 0
          }

          $previousCommit = "${{ github.event.before }}"
          if ([string]::IsNullOrWhiteSpace($previousCommit) -or $previousCommit -match "^0+$") {
            "run=false" >> $env:GITHUB_OUTPUT
            "publish=false" >> $env:GITHUB_OUTPUT
            "current=$currentVersion" >> $env:GITHUB_OUTPUT
            "previous=" >> $env:GITHUB_OUTPUT
            "No previous commit was available, so NuGet publishing is skipped."
            exit 0
          }

          $facadeProjects = @($packageProjects | Where-Object { $_.Id -in @("Deskband11Lib.WinUI", "Deskband11Lib.Wpf", "Deskband11Lib.Uno.Skia") })
          $shouldPublish = $false
          $previousVersions = @()

          foreach ($packageProject in $facadeProjects) {
            $previousVersion = Get-PreviousProjectVersion $previousCommit $packageProject.Path
            if ($null -eq $previousVersion) {
              $shouldPublish = $true
              $previousVersions += "$($packageProject.Id)=<new>"
              continue
            }

            $previousVersions += "$($packageProject.Id)=$previousVersion"
            $currentSemanticVersion = [System.Management.Automation.SemanticVersion]::Parse($currentVersions[$packageProject.Id])
            $previousSemanticVersion = [System.Management.Automation.SemanticVersion]::Parse($previousVersion)
            if ($currentSemanticVersion -gt $previousSemanticVersion) { $shouldPublish = $true }
          }

          "run=$($shouldPublish.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "publish=$($shouldPublish.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "current=$currentVersion" >> $env:GITHUB_OUTPUT
          "previous=$($previousVersions -join ', ')" >> $env:GITHUB_OUTPUT

          if ($shouldPublish) {
            "Facade package version changed or package is new. NuGet publishing will continue. Current=$currentVersion Previous=$($previousVersions -join ', ')"
          }
          else {
            "Facade package versions did not increase. NuGet publishing is skipped. Current=$currentVersion Previous=$($previousVersions -join ', ')"
          }

      - name: Setup .NET
        if: steps.version.outputs.run == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        if: steps.version.outputs.run == 'true'
        run: dotnet test Deskband11Lib.slnx -c Release

      - name: Pack Core
        if: steps.version.outputs.run == 'true'
        run: dotnet pack Deskband11Lib.Core/Deskband11Lib.Core.csproj -c Release /p:ContinuousIntegrationBuild=true --output artifacts/packages

      - name: Pack WinUI
        if: steps.version.outputs.run == 'true'
        run: dotnet pack Deskband11Lib.WinUI/Deskband11Lib.WinUI.csproj -c Release /p:ContinuousIntegrationBuild=true --output artifacts/packages

      - name: Pack WPF
        if: steps.version.outputs.run == 'true'
        run: dotnet pack Deskband11Lib.Wpf/Deskband11Lib.Wpf.csproj -c Release /p:ContinuousIntegrationBuild=true --output artifacts/packages

      - name: Pack Uno Skia
        if: steps.version.outputs.run == 'true'
        run: dotnet pack Deskband11Lib.Uno.Skia/Deskband11Lib.Uno.Skia.csproj -c Release /p:ContinuousIntegrationBuild=true --output artifacts/packages

      - name: Validate packages
        if: steps.version.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          for package_id in Deskband11Lib.Core Deskband11Lib.WinUI Deskband11Lib.Wpf Deskband11Lib.Uno.Skia; do
            package_path="artifacts/packages/${package_id}.${{ steps.version.outputs.current }}.nupkg"
            if [ ! -f "$package_path" ]; then
              echo "Missing expected package: $package_path" >&2
              exit 1
            fi
          done

      - name: Publish packages to NuGet.org
        if: steps.version.outputs.publish == 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY secret is not configured." >&2
            exit 1
          fi

          for package_id in Deskband11Lib.Core Deskband11Lib.WinUI Deskband11Lib.Wpf Deskband11Lib.Uno.Skia; do
            dotnet nuget push "artifacts/packages/${package_id}.${{ steps.version.outputs.current }}.nupkg" \
              --api-key "$NUGET_API_KEY" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done
